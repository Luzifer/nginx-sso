name: test-and-build

on:
  push: {}

permissions:
  contents: read

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:3b401cf9e3b0252d972a6d7e45aad8d9d06f65dda306551a9cf43e4c1e10fdf8
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint and test code
        run: |
          go test -v ./...

      - name: Build Locally
        run: go build .

      - name: Execute Trivy scan
        run: make trivy
