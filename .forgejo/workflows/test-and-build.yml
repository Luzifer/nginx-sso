name: test-and-build

on:
  push: {}

permissions:
  contents: read

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:65bd1f53144b789e3992f56bf1ec6396c17beff6ac6e0d5c22b2fe4565436d48
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint and test code
        run: |
          go test -v ./...

      - name: Build Locally
        run: go build .

      - name: Execute Trivy scan
        run: make trivy
